name: BuildRelease

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete workflows history
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: ./build.ps1

      - name: Extract tag name
        id: extract_tag
        run: |
          $TAG_NAME = "${{ github.ref }}".Replace('refs/tags/', '')
          echo "tag_name=$TAG_NAME" >> $env:GITHUB_OUTPUT

      - name: Get tag description
        id: get_tag_description
        run: |
          $TAG_NAME = "${{ github.ref }}".Replace('refs/tags/', '')
          # 尝试获取带注释标签的消息
          $TAG_DESCRIPTION = git tag -l -n9999 $TAG_NAME
          if ($TAG_DESCRIPTION) {
            # 移除第一行（标签名），保留其余内容作为描述
            $LINES = $TAG_DESCRIPTION -split "`n"
            if ($LINES.Count -gt 1) {
              $TAG_DESCRIPTION = ($LINES[1..($LINES.Count-1)] -join "`n").Trim()
            } else {
              $TAG_DESCRIPTION = "Release $TAG_NAME"
            }
          } else {
            # 如果没有注释，使用默认描述
            $TAG_DESCRIPTION = "Release $TAG_NAME"
          }
          echo "Tag description: $TAG_DESCRIPTION"
          echo "tag_description<<EOF" >> $env:GITHUB_OUTPUT
          echo "$TAG_DESCRIPTION" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag_name }}
          name: ${{ steps.extract_tag.outputs.tag_name }}
          body: ${{ steps.get_tag_description.outputs.tag_description }}
          draft: false
          prerelease: false
          files: |
            ./bin/Working/Working_x86.exe
            ./bin/Working/Working_x64.exe
